<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" /> <!-- Tailwind blue-600 -->
      <stop offset="100%" stop-color="#1e40af" /> <!-- Tailwind blue-800 -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-opacity="0.35" flood-color="#000000" />
    </filter>
  </defs>
  <!-- Background with rounded corners (App Icon Style) -->
  <rect width="512" height="512" rx="112" fill="url(#blueGrad)" />
  
  <!-- The elegant 'S' character -->
  <text x="48%" y="55%" font-family="'Playfair Display', serif, 'Times New Roman'" font-size="360" font-style="italic" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">S</text>
  
  <!-- The signature square from the logo -->
  <rect x="370" y="340" width="56" height="56" fill="#ffffff" rx="12" filter="url(#shadow)" />
</svg>
